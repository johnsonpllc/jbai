<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat with Vex — JB.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07090f;--bg2:#0e1120;--bg3:#141828;
  --amber:#f59e0b;--teal:#14b8a6;
  --text:#e8eaf2;--muted:#7a849c;
  --border:rgba(255,255,255,0.07);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;}
.online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#34d399;border:2px solid var(--bg2);}
.header-info h1{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:.95rem;}
.header-info p{font-size:.68rem;color:#34d399;display:flex;align-items:center;gap:4px;}
.header-info p::before{content:'';width:5px;height:5px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
.back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:.8rem;border:1px solid var(--border);padding:6px 14px;border-radius:7px;transition:color .2s;}
.back:hover{color:var(--text);}
/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:10px;align-items:flex-end;animation:fadeUp .3s ease;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.msg-av.bot{background:linear-gradient(135deg,var(--amber),var(--teal));}
.msg-av.user{background:var(--bg3);border:1px solid var(--border);}
.msg-wrap{display:flex;flex-direction:column;gap:3px;max-width:72%;}
.msg.user .msg-wrap{align-items:flex-end;}
.msg-name{font-size:.68rem;color:var(--muted);font-weight:700;letter-spacing:.05em;}
.bubble{padding:11px 15px;border-radius:4px 14px 14px 14px;font-size:.88rem;line-height:1.65;white-space:pre-wrap;}
.bubble.bot{background:var(--bg2);border:1px solid var(--border);}
.bubble.user{background:#1a1a2e;border:1px solid rgba(100,100,180,.2);border-radius:14px 4px 14px 14px;}
.ts{font-size:.65rem;color:var(--muted);}
/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px;}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:bounce 1.2s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:.2s;}
.tdot:nth-child(3){animation-delay:.4s;}
/* QUICK REPLIES */
.quick-replies{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.qr{background:transparent;border:1px solid rgba(245,158,11,.4);color:var(--amber);font-size:.72rem;padding:5px 12px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.qr:hover{background:rgba(245,158,11,.1);}
/* INPUT */
.input-area{border-top:1px solid var(--border);padding:12px 16px;background:var(--bg2);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:8px 12px 8px 15px;transition:border-color .2s;}
.input-row:focus-within{border-color:rgba(245,158,11,.4);}
textarea{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;resize:none;outline:none;line-height:1.55;max-height:90px;overflow-y:auto;}
.send-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.send-btn.active{background:var(--amber);border-color:var(--amber);box-shadow:0 4px 16px rgba(245,158,11,.3);}
.powered{text-align:center;font-size:.62rem;color:var(--muted);margin-top:6px;}
.powered span{color:var(--amber);font-weight:700;}
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🤖<div class="online"></div></div>
  <div class="header-info">
    <h1>Vex — JB.AI Assistant</h1>
    <p>Online · typically replies instantly</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <a href="/jb.ai/blog/" class="back">Blog</a>
    <a href="/jb.ai/" class="back">← JB.AI</a>
  </div>
</div>

<div class="messages" id="messages"></div>
<div class="quick-replies" id="quick-replies"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask me anything…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
      oninput="updateBtn()"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">↑</button>
  </div>
  <p class="powered">Powered by <span>JB.AI</span> · AI assistant for local business questions</p>
</div>

<script>
const API_URL = window.JBAI_PROXY ? window.JBAI_PROXY+'?service=anthropic' : 'https://tmjpllc.com/jb.ai/proxy.php?service=anthropic';
const SYSTEM = `You are Vex, the friendly AI assistant for JB.AI — a company that helps local small businesses grow with AI Chatbots, AI Voice Bots, and professional websites.

PERSONALITY: Warm, conversational, genuinely helpful — never pushy or salesy. Speak plainly. Ask smart follow-up questions. Your first goal is to understand their business situation.

SERVICES & PRICING:
AI Chatbot (standalone): $500 setup + $99/mo — installs on any website, captures leads 24/7, answers FAQs, books appointments
AI Voice Bot (standalone): $1,000 setup + $149/mo — answers every call, qualifies leads, books appointments by phone
AI Chatbot + AI Voice Bot Bundle: $1,400 setup + $199/mo — complete web and phone coverage. BEST VALUE — saves $500 on setup vs. buying separately, saves $49/mo on maintenance

Website Tiers:
- Starter: $399 one-time — custom template, self-hosted. Add hosting for $79/mo
- Standard: $1,000 setup + $99/mo — hosted, AI Chatbot included, online booking, email capture, Google Business optimization, 2 hrs/mo updates
- Premium: $2,000 setup + $199/mo — hosted, AI Chatbot + AI Voice Bot included, advanced SEO, review management, 3 hrs/mo updates, priority support, quarterly strategy call

MAINTENANCE PLANS INCLUDE:
- Monthly performance reports (automated)
- Up to 2 hrs/mo of updates and script changes
- 48-hour support response time
- WhatsApp/text support line for all paid clients
- Bug fixes at no extra charge

PROMO CODE:
- Code JBAI5 gives 5% off any setup fee (not monthly fees)
- Exclusive to newsletter subscribers — delivered in the welcome email
- If someone asks about a discount, tell them to subscribe to The JB.AI Weekly at tmjpllc.com/jb.ai/#newsletter

KEY STATS:
- AI Chatbots capture 35% more leads after hours
- AI Voice Bots answer 100% of calls — zero missed
- Average ROI is 3.5x per $1 spent on AI customer service
- Automating 5 hrs/week saves $6,500+/year

CONVERSATION APPROACH:
1. Find out what type of business they run
2. Ask if they miss calls or lose leads after hours
3. Ask if they have a website and if it generates inquiries
4. Based on answers, recommend the right service
5. If they ask about a discount, tell them to subscribe to the newsletter to receive an exclusive code by email
6. Direct them to tmjpllc.com/jb.ai/#contact-cta to get started

RULES:
- Never mention "audit" or any audit service
- Keep responses 2-4 sentences max
- Always ask what type of business they run if they haven't said
- Bundle is $1,400 setup (not $1,500) — always use correct pricing`;

const QUICK = ['How much does it cost?','Can you help my restaurant?','How fast can I get started?','What is an AI Voice Bot?'];
let history = [];
let loading = false;

function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const isBot = role === 'assistant';
  msgs.innerHTML += `<div class="msg ${isBot?'bot':'user'}">
    <div class="msg-av ${isBot?'bot':'user'}">${isBot?'🤖':'👤'}</div>
    <div class="msg-wrap">
      ${isBot?'<span class="msg-name">SAGE</span>':''}
      <div class="bubble ${isBot?'bot':'user'}">${content}</div>
      <span class="ts">${ts()}</span>
    </div>
  </div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `<div class="msg bot" id="typing-indicator">
    <div class="msg-av bot">🤖</div>
    <div class="bubble bot" style="padding:10px 14px;"><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>
  </div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function showQuickReplies() {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = QUICK.map(q=>`<button class="qr" onclick="send('${q}')">${q}</button>`).join('');
}

function hideQuickReplies() {
  document.getElementById('quick-replies').innerHTML = '';
}

function updateBtn() {
  const btn = document.getElementById('send-btn');
  const val = document.getElementById('input').value.trim();
  btn.classList.toggle('active', !!val && !loading);
}

async function send(override) {
  if(loading) return;
  const inp = document.getElementById('input');
  const content = override || inp.value.trim();
  if(!content) return;
  inp.value = '';
  updateBtn();
  hideQuickReplies();

  history.push({role:'user',content});
  addMessage('user', content);
  loading = true;
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || data.content?.find(c=>c.type==='text')?.text || "Sorry, I had a hiccup. Please try again!";
    removeTyping();
    history.push({role:'assistant',content:reply});
    addMessage('assistant', reply);
  } catch {
    removeTyping();
    addMessage('assistant','Sorry, I had a connection issue. Please try again in a moment!');
  }
  loading = false;
  updateBtn();
}

// Init
addMessage('assistant', "Hey there! 👋 I'm Vex, JB.AI's assistant.\n\nI help local businesses figure out if an AI Chatbot, AI Voice Bot, or new website is the right fit — and what it would look like for your specific situation.\n\nWhat type of business do you run?");
showQuickReplies();
</script>
</body>
</html>
